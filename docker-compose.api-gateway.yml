name: traefik

services:
  traefik:
    image: traefik:latest
    command:
      - '--api=true'
      - '--api.dashboard=true'
      - '--log.level=DEBUG'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.traefik.address=:8080'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.websecure.address=:443'
      - '--certificatesresolvers.cert-resolver.acme.httpchallenge=true'
      - '--certificatesresolvers.cert-resolver.acme.httpchallenge.entrypoint=web'
      - '--certificatesresolvers.cert-resolver.acme.email=support@piyushgarg.dev'
      - '--certificatesresolvers.cert-resolver.acme.storage=/letsencrypt/acme.json'
      - '--entrypoints.web.http.redirections.entrypoint.to=websecure'
      - '--entrypoints.web.http.redirections.entrypoint.scheme=https'
      - '--ping=true'
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
      - './certificates/letsencrypt:/letsencrypt'
    labels:
      traefik.enable: true
      traefik.port: 8080
      traefik.http.routers.api.entrypoints: 'websecure'
      traefik.http.routers.api.service: 'api@internal'
      traefik.http.routers.api.tls: 'true'
      traefik.http.routers.api.tls.certresolver: 'cert-resolver'
    ports:
      - '3001:80'
      - '8080:8080'
      - '443:443'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - traefik
      - chatvia-network
      # - traefik-dozzle

networks:
  traefik:
    name: traefik
  chatvia-network:
    name: chatvia-network
  # traefik-dozzle:
  #   name: traefik-dozzle