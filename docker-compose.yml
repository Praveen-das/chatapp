version: '3.4'

services:
  zookeeper:
    image: zookeeper
    ports:
      - 2181:2181
  kafka:
    image: confluentinc/cp-kafka
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
    environment:
      - KAFKA_ZOOKEEPER_CONNECT=192.168.1.4:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://192.168.1.4:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
  sessionStore:
    image: redis/redis-stack:latest
    ports:
      - 6379:6379
      - 8001:8001
    volumes:
      - /local-data/:/data
  pubsub:
    image: redis/redis-stack:latest
    ports:
      - 6380:6379
      - 8002:8001
    volumes:
      - /local-data/:/data
