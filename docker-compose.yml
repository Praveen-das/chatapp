  # redis:
  #   restart: always
  #   image: redis/redis-stack:latest
  #   ports:
  #     - 6379:6379
  #     - 8001:8001
  #   volumes:
  #     - /local-data/:/data

  sessionservice:
    image: sessionservice
    restart: always
    build:
      context: .
      dockerfile: ./apps/session-service/Dockerfile
    environment:
      - REDIS_SERVICE_URI=${REDIS_SERVICE_URI}
      - JWT_USER_TOKEN_SECRET_KEY=${JWT_USER_TOKEN_SECRET_KEY}
      - JWT_REFRESH_TOKEN_SECRET_KEY=${JWT_REFRESH_TOKEN_SECRET_KEY}
      - JWT_ACCESS_TOKEN_SECRET_KEY=${JWT_ACCESS_TOKEN_SECRET_KEY}
    ports:
      - "5000:5000"
    networks:
      - backend-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.session.rule=PathPrefix(`/session`)"
      - "traefik.http.routers.session.entrypoints=web"
      - "traefik.http.middlewares.strip-session.stripprefix.prefixes=/session"
      - "traefik.http.routers.session.middlewares=strip-session,cors-headers@file"
      - "traefik.http.services.session.loadbalancer.server.port=5000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  backend:
    image: backend
    restart: always
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - JWT_USER_TOKEN_SECRET_KEY=${JWT_USER_TOKEN_SECRET_KEY}
      - JWT_ACCESS_TOKEN_SECRET_KEY=${JWT_ACCESS_TOKEN_SECRET_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_SERVICE_SID=${TWILIO_SERVICE_SID}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_USERNAME=${REDIS_USERNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - KAFKA_HOST=${KAFKA_HOST}
      - KAFKA_SSL_CA_B64=${KAFKA_SSL_CA_B64}
      - KAFKA_SSL_CERT_B64=${KAFKA_SSL_CERT_B64}
      - KAFKA_SSL_KEY_B64=${KAFKA_SSL_KEY_B64}
    ports:
      - "4000:4000"
      - "27017:27017"
    networks:
      - backend-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/db`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.middlewares.strip-db.stripprefix.prefixes=/db"
      - "traefik.http.routers.backend.middlewares=strip-db,cors-headers@file"
      - "traefik.http.services.backend.loadbalancer.server.port=4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  socket-service:
    image: socket-service
    restart: always
    build:
      context: .
      dockerfile: ./apps/socket-service/Dockerfile
    environment:
      - REDIS_SERVICE_URI=${REDIS_SERVICE_URI}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_USERNAME=${REDIS_USERNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_HOST=${KAFKA_HOST}
      - KAFKA_SSL_CA_B64=${KAFKA_SSL_CA_B64}
      - KAFKA_SSL_CERT_B64=${KAFKA_SSL_CERT_B64}
      - KAFKA_SSL_KEY_B64=${KAFKA_SSL_KEY_B64}
    ports:
      - "3002:3002"
    networks:
      - backend-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.socket.rule=PathPrefix(`/socket.io`)"
      - "traefik.http.routers.socket.entrypoints=web"
      - "traefik.http.routers.socket.middlewares=cors-headers@file"
      - "traefik.http.services.socket.loadbalancer.server.port=3002"
      # Enable WebSocket transport via Traefik's default ServersTransport
      - "traefik.http.services.socket.loadbalancer.passHostHeader=true"
    # healthcheck:
    #   test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3002/', r => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))\""]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 15s
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "0.5"
    #       memory: 512M
    #     reservations:
    #       cpus: "0.25"
    #       memory: 256M

  traefik:
    image: traefik:v3.4
    restart: always
    ports:
      - "3001:80"       # Clients still hit :3001
      - "9090:8080"     # Dashboard (dev only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
    networks:
      - frontend
      - backend-net
    # depends_on:
    #   - backend
    #   - sessionservice
    #   - socket-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

networks:
  frontend:
    driver: bridge
  backend-net:
    driver: bridge
