name: Deploy Socket Service to Amazon ECS

on:
  push:
    branches: ["master"]
    paths:
      - "apps/socket-service/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - "docker-compose.prod.yml"
      - "ecs/task-definitions/socket-service.json"
      - ".github/workflows/deploy-socket-service.yml"

env:
  AWS_REGION: ap-south-1
  ECS_CLUSTER: chatvia-prod

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker compose -f docker-compose.prod.yml build socket-service
          docker compose -f docker-compose.prod.yml push socket-service

      - name: Fill in the new image ID in the Socket ECS task definition
        id: task-def-socket
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs/task-definitions/socket-service.json
          container-name: socket-service-container
          image: ${{ steps.login-ecr.outputs.registry }}/chatvia-socket-service:${{ github.sha }}

      - name: Deploy Socket to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-socket.outputs.task-definition }}
          service: chatvia-socket-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
