# Traefik Static Configuration
# =============================================================

api:
  dashboard: true
  insecure: true   # Dashboard on :8080 without auth (dev only)

entryPoints:
  web:
    address: ":80"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false    # Only route services with traefik.enable=true
    network: chatapp_backend-net
    watch: true
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

log:
  level: INFO

accessLog: {}
