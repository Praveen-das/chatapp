# Shared Middlewares — baked into Traefik image
# =============================================================

http:
  middlewares:
    strip-session:
      stripPrefix:
        prefixes:
          - "/session"

    strip-db:
      stripPrefix:
        prefixes:
          - "/db"

    cors-headers:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
          - "PATCH"
        accessControlAllowHeaders:
          - "Origin"
          - "Authorization"
          - "Content-Type"
          - "Accept"
          - "Cache-Control"
        accessControlAllowOriginList:
          - "*"                           # TODO: Lock down before real production
        accessControlMaxAge: 3600
        addVaryHeader: true
